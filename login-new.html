<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GlamourGlow Beauty Parlour</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="form-container">
        <div class="form-title">
            <i class="ri-flower-line" style="color: var(--gold); margin-right: 10px;"></i>
            GlamourGlow
        </div>
        <div class="form-subtitle">Login to Your Account</div>

        <div id="message"></div>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <label for="rememberMe" style="margin: 0;">Remember me</label>
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="form-link">
            <p>Don't have an account? <a href="register.html">Sign Up</a></p>
            <p><a href="update-password.html">Forgot Password?</a></p>
        </div>

        <div style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--gray);">
            <p style="font-size: 12px; color: #666;">Demo Credentials:</p>
            <p style="font-size: 12px; color: #666;">
                Email: <strong>demo@beauty.com</strong><br>
                Password: <strong>demo123</strong>
            </p>
            <button type="button" style="background: var(--light-purple); color: var(--primary-pink); padding: 8px 15px; border-radius: 20px; margin-top: 10px; border: none; cursor: pointer; font-size: 12px;" onclick="document.getElementById('email').value = 'demo@beauty.com'; document.getElementById('password').value = 'demo123';">Use Demo</button>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        // Pre-register demo user
        const demoUser = {
            fullName: 'Demo User',
            email: 'demo@beauty.com',
            phone: '555-0000',
            password: 'demo123'
        };

        if (!auth.userExists(demoUser.email)) {
            auth.register(demoUser);
        }
    </script>
</body>
</html>
