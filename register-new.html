<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - GlamourGlow Beauty Parlour</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="form-container">
        <div class="form-title">
            <i class="ri-flower-line" style="color: var(--gold); margin-right: 10px;"></i>
            GlamourGlow
        </div>
        <div class="form-subtitle">Create Your Account</div>

        <div id="message"></div>

        <form onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="fullName">Full Name *</label>
                <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" minlength="6" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" placeholder="Min 6 chars with @, A-Z, 0-9" minlength="6" pattern="(?=.*[A-Z])(?=.*\d)(?=.*@).{6,}" title="Password must be at least 6 characters and include @, one uppercase letter, and one number." required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password *</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms" style="margin: 0;">I agree to the terms and conditions</label>
            </div>

            <button type="submit">Register</button>
        </form>

        <div class="form-link">
            <p>Already have an account? <a href="login-new.html">Login</a></p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
