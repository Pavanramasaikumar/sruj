<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password - GlamourGlow Beauty Parlour</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="form-container">
        <div class="form-title">
            <i class="ri-flower-line" style="color: var(--gold); margin-right: 10px;"></i>
            GlamourGlow
        </div>
        <div class="form-subtitle">Update Your Password</div>

        <div id="message"></div>

        <form onsubmit="handleUpdatePassword(event)">
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" placeholder="Enter your registered email" required>
            </div>

            <div class="form-group">
                <label for="oldPassword">Current Password *</label>
                <input type="password" id="oldPassword" name="oldPassword" placeholder="Enter your current password" required>
            </div>

            <div class="form-group">
                <label for="newPassword">New Password *</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="Min 6 chars with @, A-Z, 0-9" minlength="6" pattern="(?=.*[A-Z])(?=.*\d)(?=.*@).{6,}" title="Password must be at least 6 characters and include @, one uppercase letter, and one number." required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm New Password *</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your new password" required>
            </div>

            <button type="submit">Update Password</button>
        </form>

        <div class="form-link">
            <p>Back to <a href="login-new.html">Login</a></p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
